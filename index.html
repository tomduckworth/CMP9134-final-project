<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Ground Control</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            border: 2px solid #333;
            padding: 20px;
            border-radius: 5px;
        }
        /* Basic Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(10, 30px);
            grid-template-rows: repeat(10, 30px);
            gap: 1px;
            background-color: #333; /* Acts as the border between cells */
            width: 309px;
            margin-bottom: 20px;
        }
        .cell {
            background-color: #fff;
            width: 100%;
            height: 100%;
        }
        .robot {
            background-color: #28a745; /* Simple green dot */
            border-radius: 50%;
            width: 80%;
            height: 80%;
            margin: 10%;
        }
        /* Controls */
        .controls label {
            display: block;
            margin-bottom: 10px;
        }
        button {
            margin-top: 10px;
            padding: 10px;
            width: 100%;
            font-size: 16px;
            cursor: pointer;
        }
        .status {
            margin-top: 20px;
            color: #d9534f; /* Red text */
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Ground Control</h2>

        <div class="grid" id="grid">
            </div>

        <div class="controls">
            <label>X Coordinate (0-9): 
                <input type="number" id="x" min="0" max="9" value="0">
            </label>
            <label>Y Coordinate (0-9): 
                <input type="number" id="y" min="0" max="9" value="0">
            </label>
            <button onclick="alert('Transmitting to Python...')">Transmit Move</button>
        </div>

        <div class="status">
            Status: Reconnecting to Robot...
        </div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        for (let y = 9; y >= 0; y--) {
            for (let x = 0; x <= 9; x++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                
                // Place the robot marker at (2, 2)
                if (x === 2 && y === 2) {
                    const robot = document.createElement('div');
                    robot.className = 'robot';
                    cell.appendChild(robot);
                }
                
                grid.appendChild(cell);
            }
        }
    </script>
</body>
</html>
