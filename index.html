<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ground Control Station - Prototype</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0b0f19; /* Deep dark blue background */
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar {
            background-color: #111827;
            border-bottom: 1px solid #1f2937;
        }
        .panel {
            background-color: #1f2937;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            height: 100%;
        }
        /* Tactical Grid Styling */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 2px;
            background-color: #4b5563;
            padding: 4px;
            border-radius: 4px;
            aspect-ratio: 1;
        }
        .grid-cell {
            background-color: #111827;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .robot-marker {
            background-color: #10b981; /* Glowing green dot */
            border-radius: 50%;
            width: 70%;
            height: 70%;
            box-shadow: 0 0 10px #10b981;
        }
        /* Fitts's Law Transmit Button */
        .btn-transmit {
            font-size: 1.2rem;
            font-weight: bold;
            padding: 15px;
            width: 100%;
        }
        .log-box {
            font-family: monospace;
            background-color: #111827;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #374151;
            min-height: 80px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-4 px-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1 fw-bold text-primary">🤖 CMP9134 Ground Control</span>
            <div class="d-flex align-items-center">
                <span class="badge bg-secondary fs-6 border border-light">User Role: COMMANDER</span>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <div class="row g-4">
            
            <div class="col-md-3">
                <div class="panel">
                    <h4 class="text-info border-bottom border-secondary pb-2">System Telemetry</h4>
                    <ul class="list-unstyled mt-3 fs-5">
                        <li class="mb-2">🔋 <strong>Battery:</strong> <span class="text-success">85%</span></li>
                        <li class="mb-2">📡 <strong>Status:</strong> <span class="text-success">Online</span></li>
                        <li class="mb-2">📍 <strong>Position:</strong> X: 2 | Y: 2</li>
                    </ul>
                </div>
            </div>

            <div class="col-md-5">
                <div class="panel d-flex flex-column align-items-center">
                    <h4 class="text-info border-bottom border-secondary pb-2 w-100 text-center">Tactical Grid</h4>
                    <div class="grid-container w-100 mt-3" id="tacticalGrid">
                        </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="panel">
                    <h4 class="text-info border-bottom border-secondary pb-2">Detail: Move Robot Panel</h4>
                    
                    <div class="mt-3">
                        <label class="form-label text-light fw-bold">Target X Coordinate (0-9):</label>
                        <input type="number" id="inputX" class="form-control bg-dark text-light border-secondary mb-3" min="0" max="9" value="0">
                        
                        <label class="form-label text-light fw-bold">Target Y Coordinate (0-9):</label>
                        <input type="number" id="inputY" class="form-control bg-dark text-light border-secondary mb-4" min="0" max="9" value="0">
                        
                        <button id="transmitBtn" class="btn btn-primary btn-transmit mb-3">TRANSMIT MOVE</button>
                        
                        <button class="btn btn-outline-danger fw-bold w-100 py-2 mb-4">EMERGENCY STOP</button>
                    </div>

                    <h6 class="text-secondary mb-2">Command Log:</h6>
                    <div id="commandLog" class="log-box text-secondary">
                        Awaiting input...
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Draw the 10x10 Grid
        const grid = document.getElementById('tacticalGrid');
        for (let y = 9; y >= 0; y--) {
            for (let x = 0; x <= 9; x++) {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                if (x === 2 && y === 2) {
                    cell.innerHTML = '<div class="robot-marker"></div>';
                }
                grid.appendChild(cell);
            }
        }

        // Mock Success Notification Logic
        document.getElementById('transmitBtn').addEventListener('click', function() {
            const targetX = document.getElementById('inputX').value;
            const targetY = document.getElementById('inputY').value;
            const logBox = document.getElementById('commandLog');
            
            // Validate input bounds
            if(targetX < 0 || targetX > 9 || targetY < 0 || targetY > 9) {
                logBox.innerHTML = `<span class="text-danger">❌ Error: Coordinates (${targetX}, ${targetY}) out of bounds.</span>`;
                return;
            }

            // Show mock success message
            logBox.innerHTML = `<span class="text-success">✅ Success: Command accepted. Moving robot to (${targetX}, ${targetY})...</span>`;
        });
    </script>
</body>
</html>
