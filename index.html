<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMP9134 Ground Control</title>
    <style>
        /* Basic, simple CSS without any advanced frameworks */
        body {
            background-color: #1a1e24; /* Simple dark background */
            color: #e8e8e8; /* High contrast text */
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Top Header Area */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #3a424e;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        h1 {
            color: #58a6ff;
            font-size: 20px;
            margin: 0;
        }

        .role-badge {
            background-color: #d1d5db;
            color: #111827;
            padding: 5px 12px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
        }

        /* 3-Column Layout */
        .dashboard-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap; /* Allows stacking on small screens */
        }

        .panel {
            background-color: #22272e;
            border: 1px solid #444c56;
            border-radius: 6px;
            padding: 15px;
            flex: 1;
            min-width: 250px;
        }

        .panel h2 {
            font-size: 16px;
            color: #79c0ff;
            margin-top: 0;
            border-bottom: 1px solid #444c56;
            padding-bottom: 10px;
        }

        /* Telemetry List */
        ul {
            list-style-type: none;
            padding: 0;
            line-height: 2;
        }

        /* Simple CSS Grid for the 10x10 map */
        .tactical-grid {
            display: grid;
            grid-template-columns: repeat(10, 25px);
            grid-template-rows: repeat(10, 25px);
            gap: 1px;
            background-color: #444c56;
            width: fit-content;
            margin: 0 auto;
            border: 1px solid #444c56;
        }

        .grid-cell {
            background-color: #1a1e24;
            width: 25px;
            height: 25px;
        }

        .robot-marker {
            background-color: #3fb950; /* Green dot for robot */
            border-radius: 50%;
            width: 100%;
            height: 100%;
        }

        /* Form & Inputs */
        label {
            display: block;
            margin-top: 15px;
            font-size: 14px;
            font-weight: bold;
        }

        input[type="number"] {
            width: 90%;
            padding: 8px;
            margin-top: 5px;
            background-color: #1a1e24;
            color: white;
            border: 1px solid #444c56;
            border-radius: 4px;
        }

        /* Buttons */
        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            border: none;
        }

        .btn-blue {
            background-color: #2f81f7;
            color: white;
        }

        .btn-blue:hover {
            background-color: #1f6feb;
        }

        .btn-red-outline {
            background-color: transparent;
            color: #f85149;
            border: 1px solid #f85149;
            margin-top: 10px;
        }

        /* Audit Log Console */
        .command-log {
            background-color: #0d1117;
            border: 1px solid #444c56;
            padding: 10px;
            margin-top: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            min-height: 60px;
            color: #8b949e;
        }

        .security-note {
            font-size: 11px;
            color: #8b949e;
            text-align: center;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <header>
        <h1>🤖 CMP9134 Ground Control</h1>
        <div class="role-badge">User Role: COMMANDER</div>
    </header>

    <div class="dashboard-container">
        
        <!-- Panel 1: Telemetry -->
        <div class="panel">
            <h2>System Telemetry</h2>
            <ul>
                <li>🔋 <strong>Battery:</strong> <span style="color: #3fb950;">85%</span></li>
                <li>📡 <strong>Status:</strong> Online</li>
                <li>📍 <strong>Position:</strong> X: <span id="telemetryX">2</span> | Y: <span id="telemetryY">2</span></li>
            </ul>
        </div>

        <!-- Panel 2: The Grid -->
        <div class="panel">
            <h2 style="text-align: center;">Tactical Grid</h2>
            <div id="tactical-grid" class="tactical-grid">
                <!-- Javascript will draw the 100 squares here -->
            </div>
        </div>

        <!-- Panel 3: Controls -->
        <div class="panel">
            <h2>Detail: Move Robot Panel</h2>
            <form onsubmit="event.preventDefault(); sendMoveCommand();">
                <label for="targetX">Target X Coordinate (0-9):</label>
                <input type="number" id="targetX" min="0" max="9" required>

                <label for="targetY">Target Y Coordinate (0-9):</label>
                <input type="number" id="targetY" min="0" max="9" required>

                <button type="submit" class="btn-blue">TRANSMIT MOVE</button>
                <button type="button" class="btn-red-outline">EMERGENCY STOP</button>
            </form>

            <label>Command Log:</label>
            <div id="log-box" class="command-log">Awaiting input...</div>
        </div>

    </div>

    <p class="security-note">
        System operates under strict RBAC and network IP <strong>allowlist</strong> protocols.
    </p>

    <script>
        // Store current robot position
        let currentX = 2;
        let currentY = 2;

        // Function to render the 10x10 map
        function renderGrid() {
            const gridContainer = document.getElementById('tactical-grid');
            gridContainer.innerHTML = ''; // Clear old grid

            for (let y = 0; y < 10; y++) {
                for (let x = 0; x < 10; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    
                    // If this cell matches the robot's coordinates, add the green dot
                    if (x === currentX && y === currentY) {
                        const robot = document.createElement('div');
                        robot.className = 'robot-marker';
                        cell.appendChild(robot);
                    }
                    
                    gridContainer.appendChild(cell);
                }
            }
        }

        // Function to handle the button click
        function sendMoveCommand() {
            const newX = parseInt(document.getElementById('targetX').value);
            const newY = parseInt(document.getElementById('targetY').value);
            const logBox = document.getElementById('log-box');

            // 1. Show transmission message
            logBox.innerHTML = `<span style="color: #e8e8e8;">Transmitting coordinates (X:${newX}, Y:${newY})...</span>`;

            // 2. Simulate API Network Delay for the video
            setTimeout(() => {
                // Update internal state
                currentX = newX;
                currentY = newY;

                // Update Telemetry Panel
                document.getElementById('telemetryX').innerText = currentX;
                document.getElementById('telemetryY').innerText = currentY;

                // Redraw Map
                renderGrid();

                // Log Success
                logBox.innerHTML += `<br><span style="color: #3fb950;">SUCCESS: Robot reached destination.</span>`;
            }, 1000);
        }

        // Draw the initial grid when the page loads
        renderGrid();
    </script>
</body>
</html>
