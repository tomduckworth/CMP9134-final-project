name: CI — Build, Test & Push

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pytest fastapi uvicorn requests httpx flake8

      - name: Static Analysis (Linting)
        run: |
          # Scan the root folder but exclude standard system/environment cache folders
          flake8 . --count --max-complexity=5 --show-source --statistics --exclude=.git,__pycache__,.pytest_cache,venv,.venv,anaconda3

      - name: Run test suite
        run: |
          pytest test_stats.py -v