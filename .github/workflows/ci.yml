name: CI/CD — Build, Test & Release

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*.*.*"  # Triggers the workflow on semantic version tags
  pull_request:
    branches: [ "main" ]

# Grant permissions to write packages to GitHub Container Registry (GHCR)
permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pytest fastapi uvicorn requests httpx flake8

      - name: Static Analysis (Linting)
        run: |
          # Check styles, ignoring minor trailing newline rules
          flake8 legacy_stats.py test_stats.py --count --max-complexity=5 --show-source --statistics --ignore=W292

      - name: Run test suite
        run: |
          pytest test_stats.py -v

      - name: Log in to the Container registry
        # Only run this step if the push is a semantic version tag!
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        # Only run this step if the push is a semantic version tag!
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:${{ github.ref_name }}